    <script>
    // 1. DATA LAGU
    const songs = [
        { title: "Amin Paling Serius", artist: "Sal Priadi", src: "amin.mp3", cover: "aminc.jpg"},
        { title: "Bertaut", artist: "Nadin Amizah", src: "bertaut.mp3", cover: "bertautc.jpg" },
        { title: "Multo", artist: "Cup Of Joe", src: "multo.mp3", cover: "multoc.jpg" },
        { title: "Cardigan", artist: "Taylor Swift", src: "cardigan.mp3", cover: "cardiganc.jpg" },
        { title: "The Man Who Can't Be Moved", artist: "The Script", src: "cantmove.mp3", cover: "cantmovec.jpg" },
        { title: "Goo Goo Dolls", artist: "Iris", src: "goo.mp3", cover: "gooc.jpg" },
        { title: "Line Without a Hook", artist: "Ricky Montgomery", src: "lwahook.mp3", cover: "lwahookc.jpg" },
        { title: "Abadi (Indo Version)", artist: "Dendi Nata", src: "abadi.mp3", cover: "abadic.jpg" },
        { title: "About You", artist: "The 1975", src: "aby.mp3", cover: "abyc.jpg" },
        { title: "Here With Me", artist: "D4vd", src: "hwm.mp3", cover: "hwmc.jpg" },
        { title: "No Surprises", artist: "Radiohead", src: "nsps.mp3", cover: "nspsc.jpg" }
    ];

    let index = 0;
    const audio = document.getElementById("audio-player");
    const progressContainer = document.getElementById("progress-container");
    const progressFill = document.getElementById("progress-fill");
    const playBtn = document.getElementById("play");

    // 2. FUNGSI LOAD (Simple & Clean)
    function loadSong(idx) {
        const song = songs[idx];
        document.getElementById('track-title').innerText = song.title;
        document.getElementById('track-artist').innerText = song.artist;
        document.getElementById('track-cover').src = song.cover;
        
        audio.src = song.src; // Tracking Manual
        audio.load();
    }

    // 3. FUNGSI PLAY (Pake trik sukses yang tadi)
    function playMusic() {
        audio.play()
            .then(() => {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            })
            .catch(err => console.log("User must click first!"));
    }

    // 4. EVENT HANDLERS
    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            playMusic();
        } else {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    });

    document.getElementById('next').addEventListener('click', () => {
        index = (index + 1) % songs.length;
        loadSong(index);
        playMusic();
    });

    document.getElementById('prev').addEventListener('click', () => {
        index = (index - 1 + songs.length) % songs.length;
        loadSong(index);
        playMusic();
    });

    // 5. PROGRESS BAR (Manual Tracking)
    audio.addEventListener('timeupdate', () => {
        const fill = document.getElementById('progress-fill');
        if (audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            fill.style.width = percent + "%";
        }
    });
    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth; // Lebar total bar
        const clickX = e.offsetX; // Posisi kursor pas nge-klik
        const duration = audio.duration; // Total durasi lagu

        // Rumus: (Posisi Klik / Lebar Bar) * Durasi Lagu
        audio.currentTime = (clickX / width) * duration;
    });
    // Pas lagu abis, suruh browser nge-klik tombol next buat kita
audio.addEventListener('ended', () => {
    console.log("Lagu abis, pindah otomatis...");
    document.getElementById('next').click(); 
});

    // 6. SFX (KITA JINAKKAN BIAR GAK BENTROK)
    // Jangan panggil Audio baru tiap kali hover, panggil sekali aja
    const hoverSound = new Audio('hover.mp3');
    const clickSound = new Audio('click.mp3');

    document.addEventListener('mouseover', (e) => {
        if(e.target.classList.contains('btn-pop')) {
            hoverSound.currentTime = 0;
            hoverSound.play().catch(() => {}); // Cuekin kalau error
        }
    });

    // Inisialisasi
    loadSong(index);
    </script>
